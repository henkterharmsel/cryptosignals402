name: cryptosignals402
description: "Real-time crypto intelligence API with x402 micropayments. Access funding rates (229 coins × 3 exchanges), carry trade signals, cross-exchange divergences, Bittensor subnet yields, and XRPL AMM pool data for $0.01 USDC per call on Base."
version: "1.1.0"
homepage: "https://github.com/henkterharmsel/cryptosignals402"

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      baseUrl:
        type: string
        description: "CryptoSignals402 API server URL"
        default: "http://localhost:3871"
      privateKey:
        type: string
        description: "EVM wallet private key for x402 payments (needs USDC on Base Sepolia). Optional — free endpoints work without it."
  commandFunction: |
    (config) => ({
      command: "python3",
      args: ["mcp_server.py"],
      env: {
        CRYPTO402_BASE_URL: config.baseUrl || "http://localhost:3871",
        CRYPTO402_PRIVATE_KEY: config.privateKey || ""
      }
    })
